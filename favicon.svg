<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleClip">
      <circle cx="256" cy="256" r="240"/>
    </clipPath>
  </defs>
  
  <!-- Circle background -->
  <circle cx="256" cy="256" r="256" fill="#1E4D2B"/>
  
  <!-- Inner subtle ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#3D7A54" stroke-width="3" opacity="0.4"/>
  
  <!-- Rising bars (right side) - representing growth/profitability -->
  <g opacity="0.95">
    <!-- Bar 1 (shortest) -->
    <rect x="270" y="280" width="36" height="80" rx="6" fill="#A8D5B5"/>
    <!-- Bar 2 (medium) -->
    <rect x="318" y="230" width="36" height="130" rx="6" fill="#A8D5B5" opacity="0.85"/>
    <!-- Bar 3 (tallest) -->
    <rect x="366" y="175" width="36" height="185" rx="6" fill="#F9F7F2"/>
  </g>
  
  <!-- Fork (left side) - representing cuisine/kitchen -->
  <g transform="translate(130, 120)" fill="#F9F7F2">
    <!-- Fork handle -->
    <rect x="42" y="150" width="16" height="120" rx="8"/>
    <!-- Fork head base -->
    <rect x="20" y="100" width="60" height="55" rx="6"/>
    <!-- Fork tines -->
    <rect x="24" y="50" width="10" height="60" rx="5"/>
    <rect x="45" y="50" width="10" height="60" rx="5"/>
    <rect x="66" y="50" width="10" height="60" rx="5"/>
  </g>
  
</svg>