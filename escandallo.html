<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantiChef — Escandallo inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F9F7F2;--surface:#FFFFFF;--surface2:#F2EFE9;--border:#E0DDD6;--text:#1A1916;--text2:#4A4845;--text3:#8A8784;--accent:#1E4D2B;--accent-mid:#2D5A3D;--accent-light:#E8F2EC;--accent-mint:#C8E6D0;--gold:#C4943A;--gold-light:#FFF4E0;--warn:#8B4A00;--warn-light:#FFF3E0;--danger:#8B1A1A;--danger-light:#FDEAEA}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem}
  header{background:var(--accent);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between}
  .logo-wrap{display:flex;align-items:center;gap:9px;text-decoration:none}
  .logo-icon{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:15px;height:15px}
  .logo-text{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600;letter-spacing:-.02em}
  .logo-text small{color:#A8D5B5;font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:400;display:block;letter-spacing:.06em;text-transform:uppercase;margin-top:-2px}
  .header-right{display:flex;align-items:center;gap:12px}
  .trial-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px}
  .trial-badge strong{color:#ffd700}
  .trial-badge.agotado{background:rgba(139,26,26,.3);border-color:rgba(255,100,100,.3)}
  .btn-upgrade{background:var(--gold);color:#fff;font-size:12px;font-weight:700;padding:6px 14px;border-radius:7px;text-decoration:none;white-space:nowrap}

  /* Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:center;justify-content:center;padding:1rem}
  .modal-overlay.visible{display:flex}
  .modal{background:var(--surface);border-radius:16px;padding:2rem;max-width:420px;width:100%;text-align:center;animation:fadeIn .2s ease}
  .modal-icon{width:56px;height:56px;background:var(--gold-light);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem}
  .modal-icon svg{width:28px;height:28px;color:var(--gold)}
  .modal h3{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:300;color:var(--text);margin-bottom:.5rem}
  .modal p{font-size:.92rem;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}
  .modal-plans{display:grid;grid-template-columns:1fr 1fr;gap:.75rem;margin-bottom:1.2rem}
  .modal-plan{border:1.5px solid var(--border);border-radius:10px;padding:1rem;text-align:left}
  .modal-plan.best{border-color:var(--accent);background:var(--accent-light)}
  .modal-plan-name{font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:.25rem}
  .modal-plan.best .modal-plan-name{color:var(--accent)}
  .modal-plan-price{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:300;color:var(--text);line-height:1}
  .modal-plan-period{font-size:11px;color:var(--text3)}
  .modal-plan-save{font-size:11px;font-weight:700;color:var(--gold);margin-top:.25rem}
  .btn-modal-cta{display:block;background:var(--accent);color:white;padding:12px;border-radius:9px;font-size:14px;font-weight:700;text-decoration:none;margin-bottom:.75rem}
  .modal-close{font-size:13px;color:var(--text3);background:none;border:none;cursor:pointer;text-decoration:underline}

  /* Layout */
  .container{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:.875rem}
  .card-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .card-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .field{position:relative}
  .field-label{display:flex;align-items:center;gap:5px;margin-bottom:5px}
  .field-label label{font-size:12px;font-weight:600;color:var(--text2)}
  .help-btn{width:16px;height:16px;border-radius:50%;border:1px solid var(--text3);background:none;color:var(--text3);font-size:9px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;font-family:'Plus Jakarta Sans',sans-serif;padding:0}
  .help-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
  .tooltip{display:none;position:absolute;top:calc(100% + 6px);left:0;background:var(--text);color:#fff;font-size:12px;line-height:1.5;padding:8px 12px;border-radius:8px;width:260px;z-index:100;box-shadow:0 4px 16px rgba(0,0,0,.15)}
  .tooltip::before{content:'';position:absolute;top:-5px;left:14px;width:10px;height:10px;background:var(--text);transform:rotate(45deg);border-radius:2px}
  .tooltip.visible{display:block}
  input,select{width:100%;padding:9px 12px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;border:1px solid var(--border);border-radius:8px;background:var(--surface);color:var(--text);outline:none;transition:border-color .15s;-webkit-appearance:none}
  input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,77,43,.08)}
  input[type=number]{-moz-appearance:textfield}
  input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}

  /* Toggle */
  .toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding:10px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);position:relative}
  .toggle-label{font-size:13px;font-weight:600;color:var(--text2);flex:1}
  .toggle-label small{display:block;font-size:11px;font-weight:400;color:var(--text3);margin-top:1px}
  .toggle{position:relative;width:36px;height:20px;flex-shrink:0}
  .toggle input{opacity:0;width:0;height:0}
  .toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:20px;transition:.2s}
  .toggle-slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:white;border-radius:50%;transition:.2s}
  .toggle input:checked+.toggle-slider{background:var(--accent)}
  .toggle input:checked+.toggle-slider:before{transform:translateX(16px)}
  .premium-tag{font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);background:var(--gold-light);padding:2px 7px;border-radius:4px;flex-shrink:0}
