<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantiChef — Escandallo inteligente</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#F9F7F2;--surface:#FFFFFF;--surface2:#F2EFE9;--border:#E0DDD6;--text:#1A1916;--text2:#4A4845;--text3:#8A8784;--accent:#1E4D2B;--accent-mid:#2D5A3D;--accent-light:#E8F2EC;--accent-mint:#C8E6D0;--gold:#C4943A;--gold-light:#FFF4E0;--warn:#8B4A00;--warn-light:#FFF3E0;--danger:#8B1A1A;--danger-light:#FDEAEA}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:4rem}
  header{background:var(--accent);padding:1.1rem 2rem;display:flex;align-items:center;justify-content:space-between}
  .logo-wrap{display:flex;align-items:center;gap:9px;text-decoration:none}
  .logo-icon{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .logo-icon svg{width:15px;height:15px}
  .logo-text{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600;letter-spacing:-.02em}
  .logo-text small{color:#A8D5B5;font-size:11px;font-family:'Plus Jakarta Sans',sans-serif;font-weight:400;display:block;letter-spacing:.06em;text-transform:uppercase;margin-top:-2px}
  .header-right{display:flex;align-items:center;gap:12px}
  .trial-badge{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);color:#fff;font-size:12px;padding:5px 12px;border-radius:20px;display:flex;align-items:center;gap:6px}
  .trial-badge strong{color:#ffd700}
  .btn-upgrade{background:var(--gold);color:#fff;font-size:12px;font-weight:700;padding:6px 14px;border-radius:7px;text-decoration:none}
  
  .container{max-width:860px;margin:0 auto;padding:2rem 1.5rem}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-bottom:.875rem}
  .card-title{font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:8px}
  .card-title::after{content:'';flex:1;height:1px;background:var(--border)}
  
  .grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  input, select{width:100%;padding:9px 12px;font-size:14px;border:1px solid var(--border);border-radius:8px;outline:none}
  
  .btn-ai{display:flex;align-items:center;gap:7px;padding:10px 18px;background:var(--accent);color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;margin-top:12px}
  .btn-ai:disabled{opacity:0.6;cursor:not-allowed}
  
  .ai-box{display:none;background:var(--accent-light);border:1px solid var(--accent);border-radius:10px;padding:1rem;margin-top:10px}
  .ai-box.visible{display:block}
  .spinner{width:18px;height:18px;border:2px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .ing-header{display:grid;grid-template-columns:2.5fr .7fr .7fr 80px 28px;gap:6px;margin-bottom:6px;font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase}
  .ing-row{display:grid;grid-template-columns:2.5fr .7fr .7fr 80px 28px;gap:6px;margin-bottom:6px}
  .btn-del{border:1px solid var(--border);background:none;border-radius:50%;cursor:pointer;color:var(--text3)}
  
  .metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
  .metric{background:white;border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
  .metric-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase}
  .metric-value{font-family:'Fraunces',serif;font-size:20px}
</style>
</head>
<body>

<header>
  <a href="/" class="logo-wrap">
    <div class="logo-icon"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2"><path d="M12 2l2.4 4.9L20 8l-4 3.9.9 5.5L12 15l-4.9 2.4.9-5.5L4 8l5.6-1.1z"/></svg></div>
    <span class="logo-text">QuantiChef<small>Escandallo inteligente con IA</small></span>
  </a>
  <div class="header-right">
    <div class="trial-badge">Prueba · <strong id="trial-count">5 de 5</strong></div>
    <a href="#" class="btn-upgrade">Activar plan</a>
  </div>
</header>

<div class="container">
  <div class="card">
    <div class="card-title">Datos del plato</div>
    <div class="grid-3">
      <input type="text" id="nombre" placeholder="Nombre del plato">
      <select id="categoria"><option>Principal</option><option>Entrante</option><option>Postre</option></select>
      <input type="number" id="raciones" value="1" min="1">
    </div>
    <button class="btn-ai" onclick="sugerir()" id="btn-ia">Sugerir con IA</button>
    <div class="ai-box" id="ai-box">
      <div id="ai-loading" style="display:none;align-items:center;gap:10px"><div class="spinner"></div>Analizando...</div>
      <div id="ai-error" style="color:red;display:none;font-size:12px;margin-top:10px"></div>
      <div id="sug-list" style="margin:10px 0"></div>
      <button onclick="addSugeridos()" id="btn-add" style="display:none;background:var(--accent);color:white;border:none;padding:8px 12px;border-radius:6px;cursor:pointer">Añadir ingredientes</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ingredientes</div>
    <div class="ing-header"><span>Ingrediente</span><span>Cantidad</span><span>Unidad</span><span>€/ud</span><span></span></div>
    <div id="ingredientes"></div>
    <button onclick="addIng()" style="width:100%;padding:8px;border:1px dashed var(--border);background:none;cursor:pointer;margin-top:10px">+ Añadir manual</button>
  </div>

  <div class="metrics">
    <div class="metric"><div class="metric-label">Coste total</div><div class="metric-value" id="m-coste">0,00 €</div></div>
    <div class="metric"><div class="metric-label">Por ración</div><div class="metric-value" id="m-racion">0,00 €</div></div>
    <div class="metric"><div class="metric-label">P. Venta Mín.</div><div class="metric-value" id="m-pvp">0,00 €</div></div>
    <div class="metric"><div class="metric-label">Food Cost</div><div class="metric-value" id="m-fc">30%</div></div>
  </div>
</div>

<script>
let ings = [];
let sugsIA = [];

function addIng(n='', q='', u='g', p='') {
  const id = Date.now() + Math.random();
  ings.push({id, n, q, u, p});
  render();
}

function render() {
  const container = document.getElementById('ingredientes');
  container.innerHTML = '';
  let total = 0;
  
  ings.forEach(i => {
    const div = document.createElement('div');
    div.className = 'ing-row';
    div.innerHTML = `
      <input type="text" value="${i.n}" oninput="update(${i.id}, 'n', this.value)" placeholder="Ej: Pollo">
      <input type="number" value="${i.q}" oninput="update(${i.id}, 'q', this.value)">
      <select onchange="update(${i.id}, 'u', this.value)"><option ${i.u==='g'?'selected':''}>g</option><option ${i.u==='kg'?'selected':''}>kg</option><option ${i.u==='ml'?'selected':''}>ml</option><option ${i.u==='l'?'selected':''}>l</option><option ${i.u==='ud'?'selected':''}>ud</option></select>
      <input type="number" value="${i.p}" oninput="update(${i.id}, 'p', this.value)">
      <button class="btn-del" onclick="remove(${i.id})">×</button>
    `;
    container.appendChild(div);
    
    // Cálculo básico
    let qty = parseFloat(i.q) || 0;
    let price = parseFloat(i.p) || 0;
    if (i.u === 'g' || i.u === 'ml') total += (qty / 1000) * price;
    else total += qty * price;
  });

  const rac = parseFloat(document.getElementById('raciones').value) || 1;
  document.getElementById('m-coste').textContent = total.toFixed(2) + ' €';
  document.getElementById('m-racion').textContent = (total / rac).toFixed(2) + ' €';
  document.getElementById('m-pvp').textContent = ((total / rac) / 0.3).toFixed(2) + ' €';
}

function update(id, field, val) {
  const i = ings.find(x => x.id === id);
  if (i) { i[field] = val; render(); }
}

function remove(id) {
  ings = ings.filter(x => x.id !== id);
  render();
}

async function sugerir() {
  const nombre = document.getElementById('nombre').value;
  if (!nombre) return alert('Escribe el nombre del plato');
  
  const btn = document.getElementById('btn-ia');
  const box = document.getElementById('ai-box');
  const loading = document.getElementById('ai-loading');
  const errorEl = document.getElementById('ai-error');
  
  btn.disabled = true;
  box.classList.add('visible');
  loading.style.display = 'flex';
  errorEl.style.display = 'none';

  try {
    const res = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        messages: [{ role: 'user', content: `Dame escandallo para ${nombre} en JSON: [{"nombre":"X","cantidad":0,"unidad":"g","precio_kg":0}]` }]
      })
    });
    
    const data = await res.json();
    if (data.error) throw new Error(data.error);

    const jsonText = data.content[0].text.replace(/```json|```/g, '');
    sugsIA = JSON.parse(jsonText);
    
    document.getElementById('sug-list').innerHTML = sugsIA.map(s => `<div>• ${s.nombre} (${s.cantidad}${s.unidad})</div>`).join('');
    document.getElementById('btn-add').style.display = 'block';
  } catch (err) {
    errorEl.textContent = 'Error: ' + err.message;
    errorEl.style.display = 'block';
  } finally {
    loading.style.display = 'none';
    btn.disabled = false;
  }
}

function addSugeridos() {
  sugsIA.forEach(s => addIng(s.nombre, s.cantidad, s.unidad, s.precio_kg));
  document.getElementById('ai-box').classList.remove('visible');
}

addIng(); // Iniciar con una fila vacía
</script>
</body>
</html>
