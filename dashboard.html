<html lang="es">
<head>

<title>QuantiChef — Mi cocina</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#F9F7F2;--surface:#FFFFFF;--border:#E0DDD6;--text:#1A1916;--text2:#4A4845;--text3:#8A8784;--accent:#1E4D2B;--accent-mid:#2D5A3D;--accent-light:#E8F2EC;--accent-mint:#C8E6D0;--gold:#C4943A;--gold-light:#FFF4E0;--danger:#8B1A1A;--danger-light:#FDEAEA}
  *{box-sizing:border-box;margin:0;padding:0}
  input[type="range"] { touch-action: pan-y; cursor: pointer; }
  html, body { position: relative; overflow-x: hidden; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overscroll-behavior-x: none; }
  nav{background:var(--accent);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;transition: padding 0.2s;}
  .nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
  .nav-logo-text{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-restaurante{font-size:13px;color:rgba(255,255,255,.65)}
  .nav-logout{color:rgba(255,255,255,.5);cursor:pointer;background:none;border:none;display:flex;align-items:center;gap:5px;font-size:12px;padding:0}
  .btn-suscripcion-nav { display:none; color:rgba(255,255,255,.8); border:1.5px solid rgba(255,255,255,.3); background:none; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition: all .2s; }
  .loading{display:flex;align-items:center;justify-content:center;min-height:80vh;gap:10px;font-size:14px;color:var(--text3)}
  .spinner{width:20px;height:20px;border:2px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .container{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem}
  .welcome{margin-bottom:2rem}
  .welcome-title{font-family:'Fraunces',serif;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:300;color:var(--text);line-height:1.2}
  .welcome-title em{font-style:italic;color:var(--accent)}
  .welcome-sub{font-size:.95rem;color:var(--text2);margin-top:.5rem;margin-bottom:1.5rem}
  .upload-area{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:1.5rem}
  .upload-area:hover{border-color:var(--accent-mint);background:var(--accent-light)}
  .btns-row { display:flex; gap:10px; flex-wrap:wrap; }
  .cta-nueva{display:inline-flex;align-items:center;justify-content:center;gap:8px;background:var(--accent-light);color:var(--accent);padding:12px 20px;border-radius:10px;text-decoration:none;font-size:13px;font-weight:700;transition:all .2s;border:1px solid var(--accent-mint);cursor:pointer;}
  .plan-banner{background:var(--gold-light);border:1px solid rgba(196,148,58,.25);border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
  .pro-banner{background:var(--accent-light);border:1px solid var(--accent-mint);border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:12px;margin-bottom:1.5rem}
  .pro-badge{display:inline-flex;align-items:center;gap:5px;background:var(--accent);color:white;font-size:11px;font-weight:700;padding:4px 10px;border-radius:6px}
  .review-wrap { margin-bottom: 2rem; }
  .review-card { background: var(--surface); border: 1px solid var(--accent-mint); border-radius: 12px; padding: 1.5rem; }
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:2rem}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.2rem}
  .stat-label{font-size:10px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:.4rem}
  .stat-value{font-family:'Fraunces',serif;font-size:1.8rem;font-weight:300;color:var(--text)}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:8px;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .escandallo-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;margin-bottom:10px;cursor:pointer;text-decoration:none;color:inherit}
  .ranking-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:1.5rem}
  .ranking-header{display:flex;align-items:center;justify-content:space-between;padding:.875rem 1.2rem;border-bottom:1px solid var(--border)}
  .ranking-tab{font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:none;cursor:pointer;color:var(--text3)}
  .ranking-tab.active{background:var(--accent);color:white}
  .ranking-row{display:flex;align-items:center;gap:12px;padding:.75rem 1.2rem;border-bottom:1px solid var(--border);cursor:pointer}
  .rank-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:20px;}
  .badge-good{background:var(--accent-light);color:var(--accent)}
  .badge-warn{background:#FFF3E0;color:#7A4F00}
  .badge-bad{background:var(--danger-light);color:var(--danger)}
  @media(max-width:768px){ .stats{grid-template-columns:1fr 1fr} .stats .stat:last-child{grid-column:1/-1} }
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:10px;">
    <div style="width:30px;height:30px;background:var(--gold);border-radius:7px;display:flex;align-items:center;justify-content:center;">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M22 17H2a1 1 0 0 0 0 2h20a1 1 0 0 0 0-2Z"></path><path d="M4 17a8 8 0 0 1 16 0H4Z"></path><circle cx="12" cy="5" r="1.5"></circle></svg>
    </div>
    <span class="nav-logo-text" style="color:white">QuantiChef</span>
  </div>
  <div class="nav-right">
    <span class="nav-restaurante" id="nav-restaurante"></span>
    <button class="btn-suscripcion-nav" id="btn-suscripcion-nav" onclick="abrirPortalCliente()">Suscripción</button>
    <button class="nav-logout" onclick="cerrarSesion()">Salir</button>
  </div>
</nav>

<div id="loading" class="loading"><div class="spinner"></div>Cargando tu cocina...</div>

<div id="app" style="display:none">
  <div class="container">
    <div class="welcome">
      <h1 class="welcome-title">Hola, <em id="welcome-nombre">chef</em> 👋</h1>
      <p class="welcome-sub">Controla la rentabilidad de tu carta en tiempo real.</p>
      
      <div class="upload-area" onclick="document.getElementById('file-input').click()">
        <p><strong>Sube tu albarán o factura</strong></p>
        <p style="font-size:12px; color:var(--text3)">La IA actualizará tus costes automáticamente</p>
        <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(event)">
      </div>

      <div class="btns-row">
        <button class="cta-nueva" onclick="nuevoEscandallo()">+ Nuevo plato manual</button>
        <button class="cta-nueva" style="background:var(--gold-light); border-color:var(--gold)" onclick="mostrarUrlModal()">⚡ Sube tu menú digital</button>
      </div>
    </div>

    <div class="stats" id="stats">
      <div class="stat"><div class="stat-label">Escandallos</div><div class="stat-value" id="stat-total">0</div></div>
      <div class="stat"><div class="stat-label">Food cost medio real</div><div class="stat-value" id="stat-fc" style="color:var(--accent)">—</div></div>
      <div class="stat"><div class="stat-label">Margen más alto</div><div class="stat-value" id="stat-top" style="color:var(--gold)">—</div></div>
    </div>

    <div id="ranking-section" style="display:none">
      <div class="section-title">Ranking de rentabilidad real</div>
      <div class="ranking-card">
        <div class="ranking-header">
          <div class="ranking-tabs">
            <button class="ranking-tab active" id="tab-margen" onclick="setRankingTab('margen')">Margen €</button>
            <button class="ranking-tab" id="tab-fc" onclick="setRankingTab('fc')">Food cost %</button>
          </div>
        </div>
        <div id="ranking-list"></div>
      </div>
    </div>

    <div class="section-title">Mis platos</div>
    <div id="lista-escandallos"></div>
  </div>
</div>

<div class="modal-overlay" id="modal-url" onclick="hideUrlModal(event)">
  <div class="modal" onclick="event.stopPropagation()">
    <h3>Importar Menú Digital</h3>
    <input type="url" id="url-input" class="form-input" placeholder="URL de tu carta online" style="margin: 1rem 0; width:100%">
    <button class="cta-nueva" style="width:100%; background:var(--accent); color:white" onclick="ejecutarImportacionUrl()" id="btn-import-confirm">Importar platos</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://ilzntryzijdfnntwuthp.supabase.co';
const SUPABASE_KEY='sb_publishable_qXyYLpM1403nu66tczLNCA_0s5EE3Re';
const sb=supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let restauranteId=null;
let esPremium = false;
let rankingData = [];
let rankingModo = 'margen';

async function init(){
  sb.auth.onAuthStateChange(async (event, session) => {
    if(session) await cargarDatos(session);
    else window.location.href='/login';
  });
}

async function cargarDatos(session){
  const { data: rest } = await sb.from('restaurantes').select('*').eq('user_id', session.user.id).single();
  if(!rest) return;

  restauranteId = rest.id;
  esPremium = rest.plan === 'pro';
  document.getElementById('nav-restaurante').textContent = rest.nombre;
  document.getElementById('welcome-nombre').textContent = rest.nombre;

  const {data:escandallos} = await sb.from('escandallos').select('*').eq('restaurante_id', rest.id).order('updated_at', {ascending:false});
    
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';

  if(escandallos && escandallos.length > 0){
    rankingData = escandallos;
    renderStats(escandallos);
    renderLista(escandallos);
    document.getElementById('ranking-section').style.display = 'block';
    renderRanking();
  }
}

function fmt(n){return Number(n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';}

function renderStats(lista){
  document.getElementById('stat-total').textContent = lista.length;
  
  // FILTRADO CLAVE: Usamos 'precio_carta' que es el precio real importado
  const conPrecioReal = lista.filter(e => parseFloat(e.precio_carta) > 0 && parseFloat(e.coste_racion) > 0);
  const statFcEl = document.getElementById('stat-fc');

  if (conPrecioReal.length > 0) {
    let sumaCostes = 0;
    let sumaVentas = 0;

    conPrecioReal.forEach(e => {
      sumaCostes += parseFloat(e.coste_racion);
      sumaVentas += parseFloat(e.precio_carta);
    });

    const fcMedioReal = (sumaCostes / sumaVentas) * 100;
    statFcEl.textContent = fcMedioReal.toFixed(1) + '%';
    
    // Calcular margen más alto real
    const top = conPrecioReal.reduce((a, b) => 
      ((b.precio_carta - b.coste_racion) / b.precio_carta) > ((a.precio_carta - a.coste_racion) / a.precio_carta) ? b : a
    );
    const margenTop = ((top.precio_carta - top.coste_racion) / top.precio_carta) * 100;
    document.getElementById('stat-top').textContent = margenTop.toFixed(1) + '%';
  } else {
    statFcEl.textContent = '30.0%'; // Fallback visual si no hay precios reales
    statFcEl.style.color = 'var(--text3)';
  }
}

function renderLista(lista){
  const c = document.getElementById('lista-escandallos');
  c.innerHTML = lista.map(e => {
    // Calculamos el FC real para la lista
    const fcReal = (e.precio_carta > 0) ? (e.coste_racion / e.precio_carta * 100).toFixed(1) : e.food_cost_pct;
    return `
      <div class="escandallo-card" onclick="editarEscandallo(${JSON.stringify(e).replace(/"/g,'&quot;')})">
        <div style="flex:1">
          <div style="font-weight:600">${e.nombre_plato}</div>
          <div style="font-size:12px; color:var(--text3)">FC Real: ${fcReal}%</div>
        </div>
        <div style="text-align:right">
          <div style="font-family:Fraunces; font-size:1.1rem">${fmt(e.coste_racion)}</div>
          <div style="font-size:9px; color:var(--text3)">coste ración</div>
        </div>
      </div>
    `;
  }).join('');
}

function setRankingTab(modo) {
  rankingModo = modo;
  document.getElementById('tab-margen').classList.toggle('active', modo === 'margen');
  document.getElementById('tab-fc').classList.toggle('active', modo === 'fc');
  renderRanking();
}

function renderRanking() {
  const lista = document.getElementById('ranking-list');
  const conPrecio = rankingData.filter(e => parseFloat(e.precio_carta) > 0);
  
  if (conPrecio.length === 0) {
    lista.innerHTML = '<div style="padding:2rem; text-align:center; font-size:13px; color:var(--text3)">Edita tus platos para añadirles "Precio en Carta" real</div>';
    return;
  }

  const sorted = [...conPrecio].sort((a, b) => {
    if (rankingModo === 'fc') return (a.coste_racion/a.precio_carta) - (b.coste_racion/b.precio_carta);
    return (b.precio_carta - b.coste_racion) - (a.precio_carta - a.coste_racion);
  });

  lista.innerHTML = sorted.slice(0, 5).map((e, i) => {
    const fc = (e.coste_racion / e.precio_carta * 100);
    const margenEuro = e.precio_carta - e.coste_racion;
    const badge = fc <= 30 ? 'badge-good' : fc <= 40 ? 'badge-warn' : 'badge-bad';
    const label = fc <= 30 ? 'Rentable' : fc <= 40 ? 'Ajustado' : 'Crítico';

    return `
      <div class="ranking-row" onclick="editarEscandallo(${JSON.stringify(e).replace(/"/g,'&quot;')})">
        <div style="width:25px; font-weight:bold; color:var(--text3)">${i+1}</div>
        <div style="flex:1">
          <div style="font-size:13px; font-weight:600">${e.nombre_plato}</div>
          <div style="font-size:11px; color:var(--text3)">${rankingModo==='fc' ? fc.toFixed(1)+'%' : fmt(margenEuro)+' margen'}</div>
        </div>
        <span class="rank-badge ${badge}">${label}</span>
      </div>
    `;
  }).join('');
}

function nuevoEscandallo(){ sessionStorage.removeItem('qc_escandallo_editar'); window.location.href='/escandallo'; }
function editarEscandallo(e){ sessionStorage.setItem('qc_escandallo_editar', JSON.stringify(e)); window.location.href='/escandallo'; }
async function cerrarSesion(){ await sb.auth.signOut(); window.location.href='/login'; }
function mostrarUrlModal() { document.getElementById('modal-url').classList.add('visible'); }
function hideUrlModal() { document.getElementById('modal-url').classList.remove('visible'); }

init();
</script>
</body>
</html>
