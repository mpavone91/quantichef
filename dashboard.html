<html lang="es">
<head>

<title>QuantiChef — Mi cocina</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{--bg:#F9F7F2;--surface:#FFFFFF;--border:#E0DDD6;--text:#1A1916;--text2:#4A4845;--text3:#8A8784;--accent:#1E4D2B;--accent-mid:#2D5A3D;--accent-light:#E8F2EC;--accent-mint:#C8E6D0;--gold:#C4943A;--gold-light:#FFF4E0;--danger:#8B1A1A;--danger-light:#FDEAEA; --gray-light:#F0EDE4}
  *{box-sizing:border-box;margin:0;padding:0}
  
  input[type="range"] { touch-action: pan-y; cursor: pointer; }
  html, body { position: relative; overflow-x: hidden; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overscroll-behavior-x: none; }

  /* Nav optimizado */
  nav{background:var(--accent);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between;transition: padding 0.2s;}
  .nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
  .nav-logo-icon{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:7px;display:flex;align-items:center;justify-content:center}
  .nav-logo-icon svg{width:15px;height:15px}
  .nav-logo-text{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600}
  .nav-right{display:flex;align-items:center;gap:12px}
  .nav-restaurante{font-size:13px;color:rgba(255,255,255,.65)}
  .nav-logout{color:rgba(255,255,255,.5);cursor:pointer;background:none;border:none;display:flex;align-items:center;gap:5px;font-size:12px;padding:0}
  .nav-logout:hover{color:white}
  
  .btn-suscripcion-nav { display:none; color:rgba(255,255,255,.8); border:1.5px solid rgba(255,255,255,.3); background:none; padding:6px 12px; border-radius:8px; font-size:12px; font-weight:600; cursor:pointer; transition: all .2s; }
  .btn-suscripcion-nav:hover { background: rgba(255,255,255,.1); border-color: white; color: white; }

  /* Loading */
  .loading{display:flex;align-items:center;justify-content:center;min-height:80vh;gap:10px;font-size:14px;color:var(--text3)}
  .spinner{width:20px;height:20px;border:2px solid var(--accent-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
  .spinner-sm{width:16px;height:16px;border:2px solid rgba(30,77,43,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .6s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px;}
  @keyframes spin{to{transform:rotate(360deg)}}

  .container{max-width:960px;margin:0 auto;padding:2.5rem 1.5rem}

  /* Bienvenida Branding */
  .welcome{margin-bottom:2rem}
  .welcome-tag{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--accent);margin-bottom:.5rem}
  .welcome-title{font-family:'Fraunces',serif;font-size:clamp(1.8rem,3vw,2.4rem);font-weight:300;letter-spacing:-.02em;color:var(--text);line-height:1.2}
  .welcome-title em{font-style:italic;color:var(--accent)}
  .welcome-sub{font-size:.95rem;color:var(--text2);margin-top:.5rem;margin-bottom:2rem}

  /* Acciones Grid */
  .actions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 2rem; }
  .action-card { background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; padding: 1.5rem; text-align: left; cursor: pointer; transition: all 0.2s; position: relative; text-decoration: none; display: flex; flex-direction: column; align-items: flex-start; }
  .action-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.06); border-color: var(--accent-mint); }
  .action-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 1.2rem; }
  .action-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 6px; display: flex; align-items: center; gap: 8px; width: 100%; }
  .action-sub { font-size: 12.5px; color: var(--text2); line-height: 1.4; }
  .ac-green .action-icon { background: var(--accent-light); color: var(--accent); }
  .ac-gold .action-icon { background: var(--gold-light); color: var(--gold); }
  .ac-gray .action-icon { background: var(--gray-light); color: var(--text2); }

  /* Status Modal */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;align-items:center;justify-content:center;padding:1rem;backdrop-filter:blur(4px)}
  .modal-overlay.visible{display:flex}
  .modal{background:var(--surface);border-radius:16px;padding:2.5rem 2rem;max-width:420px;width:100%;text-align:center;animation:fadeIn .2s ease; position:relative;}
  .modal-icon{width:56px;height:56px;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.2rem}
  .modal h3{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:300;color:var(--text);margin-bottom:.5rem}
  .modal p{font-size:.92rem;color:var(--text2);line-height:1.6;margin-bottom:1.5rem}

  /* El resto de estilos se mantienen igual... */
  .section-title{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);margin-bottom:1rem;display:flex;align-items:center;gap:8px; justify-content: space-between;}
  .section-title::after{content:'';flex:1;height:1px;background:var(--border)}
  .escandallo-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:1rem 1.2rem;display:flex;align-items:center;gap:1rem;transition:all .2s;cursor:pointer;text-decoration:none;color:inherit}
  .card-metric-val{font-family:'Fraunces',serif;font-size:1.1rem;font-weight:300}
  .btn-fill { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; transition: background 0.2s; display: inline-flex; align-items: center; justify-content: center; }

  @keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
  @media(max-width:768px){ .actions-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<nav>
  <a href="/dashboard" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
    <div style="width:34px;height:34px;background:linear-gradient(135deg, var(--gold) 0%, #E6B755 100%);border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.2);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#1E4D2B" stroke-width="2.5"><path d="M22 17H2a1 1 0 0 0 0 2h20a1 1 0 0 0 0-2Z"></path><path d="M4 17a8 8 0 0 1 16 0H4Z"></path><circle cx="12" cy="5" r="1.5"></circle></svg>
    </div>
    <div>
      <div style="font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600;">QuantiChef</div>
      <div style="font-family:'Plus Jakarta Sans',sans-serif;font-size:9px;color:#F5C47A;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;">Cocina Rentable</div>
    </div>
  </a>
  <div class="nav-right">
    <span class="nav-restaurante" id="nav-restaurante"></span>
    <button class="btn-suscripcion-nav" id="btn-suscripcion-nav" onclick="abrirPortalCliente()">Suscripción</button>
    <button class="nav-logout" onclick="cerrarSesion()">Salir</button>
  </div>
</nav>

<div id="loading" class="loading"><div class="spinner"></div>Cargando tu cocina...</div>

<div class="modal-overlay" id="modal-status">
  <div class="modal">
    <div class="modal-icon" id="status-icon"></div>
    <h3 id="status-title"></h3>
    <p id="status-message"></p>
    <button class="btn-fill" style="width:100%; padding:14px; font-size:15px;" onclick="cerrarStatus()">Entendido</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="container">
    <div class="welcome">
      <div class="welcome-tag">Panel de Control</div>
      <h1 class="welcome-title">Hola, <em>Chef</em> 👋</h1>
      <p class="welcome-sub">¿Qué quieres hacer hoy?</p>
      
      <div class="actions-grid">
        <div class="action-card ac-green" onclick="document.getElementById('file-input').click()">
          <div class="action-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
          <div class="action-title">Sube tu albarán</div>
          <div class="action-sub">Actualiza precios automáticamente.</div>
          <input type="file" id="file-input" accept=".pdf,.png,.jpg,.jpeg,.webp" onchange="handleFileUpload(event)" style="display:none">
        </div>

        <div class="action-card ac-gold" onclick="abrirSubidaRecetas()">
          <div class="action-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg></div>
          <div class="action-title">Digitalizar Recetas <span id="dash-upsell-lock">🔒</span></div>
          <div class="action-sub">Importa tu menú con cantidades reales.</div>
          <input type="file" id="file-input-recetas" accept=".pdf,.png,.jpg,.jpeg,.webp" onchange="handleRecetasUpload(event)" style="display:none">
        </div>

        <div class="action-card ac-gray" onclick="nuevoEscandallo()">
          <div class="action-icon"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></div>
          <div class="action-title">+ Escandallo Individual</div>
          <div class="action-sub">Crea un plato desde cero.</div>
        </div>
      </div>
    </div>

    <div class="extract-loading" id="extract-loading" style="display:none; background:var(--accent-light); padding:1rem; border-radius:10px; margin-bottom:1rem; align-items:center; gap:10px;">
      <div class="spinner"></div><span id="loading-text-dynamic" style="color:var(--accent); font-weight:600; font-size:14px;">Procesando documento...</span>
    </div>

    <div id="lista-escandallos"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://ilzntryzijdfnntwuthp.supabase.co';
const SUPABASE_KEY='sb_publishable_qXyYLpM1403nu66tczLNCA_0s5EE3Re';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

let restauranteId=null;
let esPremium = false;

// INICIALIZACIÓN
async function init(){
  sb.auth.onAuthStateChange(async (event, session) => {
    if(event==='INITIAL_SESSION'){
      if(!session) window.location.href='/login';
      else await cargarDatos(session);
    }
  });
}

// CARGAR DATOS
async function cargarDatos(session){
  const { data: rest } = await sb.from('restaurantes').select('id,nombre,plan').eq('user_id', session.user.id).maybeSingle();
  if(!rest) { await sb.auth.signOut(); window.location.href='/login'; return; }

  restauranteId = rest.id;
  esPremium = rest.plan === 'pro';
  document.getElementById('nav-restaurante').textContent = rest.nombre;
  document.getElementById('dash-upsell-lock').style.display = esPremium ? 'none' : 'inline';
  
  // Cargar lista de platos
  const {data:escandallos} = await sb.from('escandallos').select('*').eq('restaurante_id', rest.id).order('updated_at', {ascending:false});
  document.getElementById('loading').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  renderLista(escandallos || []);
}

function renderLista(lista){
  const c = document.getElementById('lista-escandallos');
  if(lista.length === 0) {
    c.innerHTML = '<div style="padding:3rem; text-align:center; color:var(--text3); border:1.5px dashed var(--border); border-radius:12px;">Aún no tienes platos.</div>';
    return;
  }
  c.innerHTML = '<div class="section-title">Mis platos</div>' + lista.map(e => `
    <div class="escandallo-card" onclick="editarEscandallo(${JSON.stringify(e).replace(/"/g,'&quot;')})">
      <div style="flex:1"><strong>${e.nombre_plato}</strong></div>
      <div class="card-metric-val">${e.coste_racion.toFixed(2)}€</div>
    </div>
  `).join('');
}

// MODAL DE ESTADO
function showStatus(title, msg, success) {
  const modal = document.getElementById('modal-status');
  const icon = document.getElementById('status-icon');
  icon.style.background = success ? 'var(--accent-light)' : 'var(--danger-light)';
  icon.style.color = success ? 'var(--accent)' : 'var(--danger)';
  icon.innerHTML = success ? '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>' : '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  document.getElementById('status-title').textContent = title;
  document.getElementById('status-message').textContent = msg;
  modal.dataset.refresh = success;
  modal.classList.add('visible');
}

function cerrarStatus() {
  const modal = document.getElementById('modal-status');
  modal.classList.remove('visible');
  if(modal.dataset.refresh === 'true') window.location.reload();
}

// SUBIDA DE RECETAS
function abrirSubidaRecetas() {
  if (!esPremium) { window.location.href = '/precios'; return; }
  document.getElementById('file-input-recetas').click();
}

async function handleRecetasUpload(e) {
  const file = e.target.files[0];
  if(!file) return;
  
  const loading = document.getElementById('extract-loading');
  document.getElementById('loading-text-dynamic').textContent = 'Digitalizando tus platos...';
  loading.style.display = 'flex';
  
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = async () => {
    try {
      const base64 = reader.result.split(',')[1];
      const { data: { session } } = await sb.auth.getSession();
      
      const resp = await fetch('/api/extract-recipe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + session.access_token },
        body: JSON.stringify({ file_base64: base64, file_type: file.name.split('.').pop(), restaurante_id: restauranteId })
      });
      
      const res = await resp.json();
      loading.style.display = 'none';
      
      if(resp.ok && res.cantidad > 0) {
        showStatus('¡Magia pura, Chef!', `Hemos digitalizado ${res.cantidad} platos. Ya puedes verlos en tu cocina.`, true);
      } else {
        showStatus('Ups, hubo un problema', res.error || 'No pudimos leer las recetas. Prueba con otro formato.', false);
      }
    } catch(err) {
      loading.style.display = 'none';
      showStatus('Error de conexión', 'No pudimos contactar con QuantiChef. Revisa tu conexión.', false);
    }
  };
}

// FUNCIONES AUXILIARES
function nuevoEscandallo(){ sessionStorage.removeItem('qc_escandallo_editar'); window.location.href='/escandallo'; }
function editarEscandallo(e){ sessionStorage.setItem('qc_escandallo_editar', JSON.stringify(e)); window.location.href='/escandallo'; }
async function cerrarSesion(){ await sb.auth.signOut(); window.location.href='/login'; }

init();
</script>
</body>
</html>
