<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuantiChef — Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg:#F9F7F2;--surface:#FFFFFF;--border:#E0DDD6;--text:#1A1916;--accent:#1E4D2B;--accent-mint:#C8E6D0;--gold:#C4943A;--danger:#8B1A1A}
    *{box-sizing:border-box;margin:0;padding:0}
    
    /* FIX BARRITAS: Evita que la pantalla se mueva a los lados al ajustar márgenes */
    input[type="range"] { touch-action: pan-y; cursor: pointer; }
    html, body { position: relative; overflow-x: hidden; font-family:'Plus Jakarta Sans',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; overscroll-behavior-x: none; }

    /* NAV: Compacto en móvil para que el logo tenga espacio */
    nav{background:var(--accent);padding:0.8rem 1.5rem;display:flex;align-items:center;justify-content:space-between}
    .nav-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
    .nav-logo-text{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600}
    .nav-right{display:flex;align-items:center;gap:10px}
    .btn-suscripcion-nav { display:none; color:#fff; border:1px solid rgba(255,255,255,.3); background:none; padding:5px 10px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; }

    .container{max-width:960px;margin:0 auto;padding:2rem 1.5rem}

    /* UPLOAD EN EL TOP: Acción inmediata al entrar */
    .welcome-title{font-family:'Fraunces',serif;font-size:clamp(1.5rem,3vw,2rem);font-weight:300;margin-bottom:1.5rem}
    .upload-area{background:var(--surface);border:2px dashed var(--border);border-radius:12px;padding:2rem;text-align:center;cursor:pointer;margin-bottom:2rem}
    .upload-area-icon{width:40px;height:40px;background:var(--accent-light);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
    .upload-area-title{font-weight:600;font-size:14px;margin-bottom:4px}
    
    .cta-nueva{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:white;padding:12px 20px;border-radius:10px;text-decoration:none;font-size:14px;font-weight:700;margin-bottom:2rem;border:none;cursor:pointer}

    /* BANNER PRO: Con botón de gestión claro */
    .pro-banner{background:var(--accent-light);border:1px solid var(--accent-mint);border-radius:10px;padding:1rem;display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:10px}
    .btn-pro-manage { background: white; border: 1px solid var(--accent); color: var(--accent); font-size: 11px; font-weight: 700; padding: 6px 12px; border-radius: 8px; cursor: pointer; }

    @media(max-width:640px){
      nav{padding:0.6rem 1rem}
      .nav-logo-text{font-size:15px}
      .container{padding:1.2rem 1rem}
      .pro-banner { flex-direction: column; align-items: stretch; text-align: center; }
      .btn-pro-manage { width: 100%; padding: 10px; }
      .cta-nueva { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/dashboard" class="nav-logo"><span class="nav-logo-text">QuantiChef</span></a>
  <div class="nav-right">
    <button class="btn-suscripcion-nav" id="btn-suscripcion-nav" onclick="abrirPortalCliente()">Suscripción</button>
    <button onclick="cerrarSesion()" style="color:rgba(255,255,255,.6);background:none;border:none;font-size:12px;cursor:pointer">Salir</button>
  </div>
</nav>

<div class="container" id="app">
  <h1 class="welcome-title">Hola, <em id="welcome-nombre">chef</em> 👋</h1>

  <div class="upload-area" onclick="document.getElementById('file-input').click()">
    <div class="upload-area-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12"/></svg></div>
    <div class="upload-area-title">Sube tu albarán o factura ahora</div>
    <p style="font-size:12px;color:var(--text3)">Extraeremos los precios automáticamente</p>
    <input type="file" id="file-input" style="display:none" onchange="handleFileUpload(event)">
  </div>

  <button class="cta-nueva" onclick="nuevoEscandallo()">+ Crear escandallo manual</button>

  <div id="pro-banner" class="pro-banner" style="display:none">
    <div style="font-weight:700;font-size:13px;color:var(--accent)">Plan Pro Activo</div>
    <button class="btn-pro-manage" onclick="abrirPortalCliente()">Gestionar cuenta / Facturas</button>
  </div>

  <div id="lista-escandallos"></div>
</div>

<script>
const SUPABASE_URL='https://ilzntryzijdfnntwuthp.supabase.co';
const SUPABASE_KEY='sb_publishable_qXyYLpM1403nu66tczLNCA_0s5EE3Re';
const {createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);

// ESCUDO ANTI-BUCLES: Forzamos logout si hay sesión pero no restaurante
async function init(){
  const { data: { session } } = await sb.auth.getSession();
  if(!session) return window.location.href='/login';
  
  const {data:rest, error} = await sb.from('restaurantes').select('*').eq('user_id',session.user.id).single();
  if(error || !rest){
    await sb.auth.signOut();
    window.location.href='/login';
  } else {
    document.getElementById('welcome-nombre').textContent = rest.nombre;
    if(rest.plan === 'pro') {
      document.getElementById('pro-banner').style.display='flex';
      document.getElementById('btn-suscripcion-nav').style.display='block';
    }
    // Cargar el resto de la interfaz...
  }
}

async function cerrarSesion(){ await sb.auth.signOut(); window.location.href='/login'; }
function nuevoEscandallo(){ sessionStorage.removeItem('qc_escandallo_editar'); window.location.href='/escandallo'; }

async function abrirPortalCliente(){
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch('/api/stripe-portal', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ restauranteId: (await sb.from('restaurantes').select('id').eq('user_id', session.user.id).single()).data.id })
  });
  const data = await res.json();
  if(data.url) window.location.href = data.url;
}

init();
</script>
</body>
</html>
