<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuantiChef — Acceder</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#F9F7F2;--surface:#FFFFFF;--border:#E0DDD6;--text:#1A1916;--text2:#4A4845;--text3:#8A8784;--accent:#1E4D2B;--accent-mid:#2D5A3D;--accent-light:#E8F2EC;--accent-mint:#C8E6D0;--gold:#C4943A;--gold-light:#FFF4E0;--danger:#8B1A1A;--danger-light:#FDEAEA}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--accent);padding:1rem 2rem;display:flex;align-items:center;justify-content:space-between}
.nav-logo{display:flex;align-items:center;gap:9px;text-decoration:none}
.nav-logo-icon{width:30px;height:30px;background:rgba(255,255,255,.15);border-radius:7px;display:flex;align-items:center;justify-content:center}
.nav-logo-icon svg{width:15px;height:15px}
.nav-logo-text{font-family:'Fraunces',serif;font-size:18px;color:#fff;font-weight:600}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem 1rem}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:100%;max-width:420px;box-shadow:0 8px 32px rgba(30,77,43,.06)}
.tabs{display:flex;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:1.75rem;gap:3px}
.tab{flex:1;padding:9px;border:none;background:none;border-radius:7px;font-size:13px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text3);cursor:pointer;transition:all .2s}
.tab.active{background:var(--surface);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.form-group{margin-bottom:1rem}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:5px}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:14px;font-family:'Plus Jakarta Sans',sans-serif;color:var(--text);background:var(--surface);outline:none}
.form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(30,77,43,.08)}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:white;border:none;border-radius:9px;font-size:15px;font-weight:700;font-family:'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:background .2s}
.btn-primary:hover{background:var(--accent-mid)}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:1rem;display:none}
.msg.error{background:var(--danger-light);color:var(--danger);border:1px solid rgba(139,26,26,.2);display:block}
.msg.success{background:var(--accent-light);color:var(--accent);border:1px solid var(--accent-mint);display:block}
</style>
</head>
<body>
<nav>
  <a href="/" class="nav-logo">
    <div class="nav-logo-icon">
      <svg width="20" height="20" viewBox="0 0 32 32" fill="none">
        <circle cx="13" cy="16" r="9" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.5)" stroke-width="1.2"/>
        <line x1="12" y1="10" x2="12" y2="22" stroke="white" stroke-width="1.8" stroke-linecap="round"/>
        <path d="M9 14.5 Q12 17 15 14.5" fill="none" stroke="white" stroke-width="1.1" stroke-linecap="round"/>
        <rect x="24" y="14" width="2.2" height="8" rx="1" fill="white"/>
      </svg>
    </div>
    <span class="nav-logo-text">QuantiChef</span>
  </a>
</nav>
<main>
  <div class="auth-card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')" id="tab-login">Iniciar sesión</button>
      <button class="tab" onclick="switchTab('registro')" id="tab-registro">Crear cuenta</button>
    </div>
    <div id="msg" class="msg"></div>
    <div id="form-login">
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="login-email" placeholder="tu@restaurante.com"></div>
      <div class="form-group"><label class="form-label">Contraseña</label><input type="password" class="form-input" id="login-pass" placeholder="••••••••"></div>
      <button class="btn-primary" onclick="login()" id="btn-login">Entrar</button>
    </div>
    <div id="form-registro" style="display:none">
      <div class="form-group"><label class="form-label">Nombre del restaurante</label><input type="text" class="form-input" id="reg-nombre" placeholder="Ej: Pizza Natura"></div>
      <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="reg-email" placeholder="tu@email.com"></div>
      <div class="form-group"><label class="form-label">Teléfono móvil</label><input type="tel" class="form-input" id="reg-telefono" placeholder="600111222"></div>
      <div class="form-group"><label class="form-label">Contraseña</label><input type="password" class="form-input" id="reg-pass" placeholder="Mínimo 8 caracteres"></div>
      <button class="btn-primary" onclick="registro()" id="btn-registro">Crear cuenta gratis</button>
    </div>
    <div id="form-verify" style="display:none">
      <div class="form-group"><label class="form-label">Código SMS de 6 dígitos</label><input type="tel" class="form-input" id="verify-code" style="text-align:center;font-size:1.5rem;letter-spacing:0.3em" placeholder="123456"></div>
      <button class="btn-primary" onclick="verificarCodigo()" id="btn-verify">Verificar cuenta</button>
    </div>
  </div>
</main>
<script>
const SUPABASE_URL = 'https://ilzntryzijdfnntwuthp.supabase.co';
const SUPABASE_KEY = 'sb_publishable_qXyYLpM1403nu66tczLNCA_0s5EE3Re';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// ESCUDO ANTI-BUCLES: Solo redirige si el restaurante existe
sb.auth.getSession().then(async ({ data: { session } }) => {
  if (session) {
    const { data: rest } = await sb.from('restaurantes').select('id').eq('user_id', session.user.id).single();
    if (rest) {
      window.location.href = '/dashboard';
    } else {
      console.log("Sesión activa pero sin restaurante. Limpiando para evitar bucles...");
      await sb.auth.signOut();
    }
  }
});

function switchTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-registro').style.display = tab === 'registro' ? 'block' : 'none';
  document.getElementById('tab-login').classList.toggle('active', tab === 'login');
  document.getElementById('tab-registro').classList.toggle('active', tab === 'registro');
}

function showMsg(txt, tipo='error') { const el = document.getElementById('msg'); el.textContent = txt; el.className = 'msg ' + tipo; }

async function login() {
  const email = document.getElementById('login-email').value;
  const pass = document.getElementById('login-pass').value;
  const { error } = await sb.auth.signInWithPassword({ email, password: pass });
  if (error) showMsg('Email o contraseña incorrectos.'); else window.location.href = '/dashboard';
}

let registroData = {};

async function registro() {
  const nombre = document.getElementById('reg-nombre').value;
  const email = document.getElementById('reg-email').value;
  const telefono = document.getElementById('reg-telefono').value.trim();
  const pass = document.getElementById('reg-pass').value;

  registroData = { nombre, email, pass, telefono };

  const { error } = await sb.auth.signInWithOtp({ phone: telefono });
  if (error) {
    showMsg('Error al enviar SMS: ' + error.message);
  } else {
    document.getElementById('form-registro').style.display = 'none';
    document.getElementById('form-verify').style.display = 'block';
    showMsg('Código enviado correctamente.', 'success');
  }
}

async function verificarCodigo() {
  const code = document.getElementById('verify-code').value;
  const { data, error } = await sb.auth.verifyOtp({ phone: registroData.telefono, token: code, type: 'sms' });
  if (error) return showMsg('Código incorrecto.');

  await sb.auth.updateUser({ email: registroData.email, password: registroData.pass });
  await sb.from('restaurantes').insert({ user_id: data.user.id, nombre: registroData.nombre });
  window.location.href = '/dashboard';
}
</script>
</body>
</html>
